<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chiller Guy Life| Images</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;1,400&family=IM+Fell+Double+Pica+SC&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="favicon.PNG">
    <style>
        body {
            font-family: 'EB Garamond', serif;
            background-color: #ffffff;
            color: #000000;
            margin: 0;
            padding: 60px 50px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            box-sizing: border-box;
        }

        main {
            flex: 1;
            width: 100%;
        }

        .section-title {
            color: #3a6b35; 
            font-size: 1.5rem;
            font-weight: normal;
            margin-bottom: 10px;
        }

        .content-divider {
            width: 100%;
            height: 1px;
            background-color: #000;
            margin-bottom: 0px; 
        }

        .layout-grid {
            display: grid;
            grid-template-columns: 1fr minmax(300px, 700px) 1fr; 
            gap: 40px;
            align-items: start;
        }

        .feed-box {
            grid-column: 2; 
            border: 1px solid #000;
            padding: 60px 40px;
            margin-top: 40px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 60px; 
            min-height: 400px;
        }

        .feed-box img {
            max-width: 70%;
            height: auto;
            display: block;
        }

        .side-image-container {
            grid-column: 3; 
            display: flex;
            justify-content: flex-end; 
            position: sticky;
            top: 40px; 
        }

        .side-image {
            width: 100%;
            max-width: 250px;
            height: auto;
            transition: opacity 0.3s ease; 
            margin-top: -25px; 
        }
        
        .side-image-container a:hover .side-image {
            opacity: 0.7;
        }

        .bottom-image-container {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-top: 40px;
        }

        .bottom-image {
            width: 80px;
            height: auto;
        }
/* --- MOBILE RESPONSIVE LAYOUT --- */
        @media (max-width: 768px) {
            body {
                padding: 30px 20px; /* Less white space around the edges on small screens */
            }

            .layout-grid {
                display: flex;
                flex-direction: column; /* Stacks the center box and side image vertically */
                gap: 40px;
            }

            .feed-box, .writing-container, .list-box {
                width: 100%;
                padding: 30px 20px; /* Shrinks the padding inside the bordered box */
                margin-top: 20px; 
                box-sizing: border-box; /* Ensures the border doesn't push off the screen */
            }

            .side-image-container {
                position: relative; /* Turns off the 'sticky' scroll effect for mobile */
                top: 0;
                justify-content: center; /* Centers the river valley image under your content */
                width: 100%;
                margin-top: 20px;
            }

            .side-image {
                margin-top: 0; /* Removes the negative margin since it's no longer next to the line */
                max-width: 180px; /* Scales the home button down slightly */
            }

            .entry-title, .piece-title {
                font-size: 1.5rem; /* Scales titles down so they don't break onto awkward lines */
            }

            .entry-body, .piece-body {
                font-size: 1.1rem; /* Slightly smaller text for easier mobile reading */
            }
        }
    </style>
</head>
<body>
    <main>
        <h2 class="section-title">Images</h2>
        <div class="content-divider"></div>

        <div class="layout-grid">
            
            <div class="feed-box" id="photo-gallery">
                </div>

            <div class="side-image-container">
                <a href="index.html">
                    <img src="river-valley.png" alt="Return Home" class="side-image">
                </a>
            </div>
        </div>

        <div class="bottom-image-container">
            <img src="trout.png" alt="Sketch" class="bottom-image">
        </div>
    </main>

</html>
