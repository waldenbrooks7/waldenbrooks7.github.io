<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chiller | Food and Drink</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;1,400&family=IM+Fell+Double+Pica+SC&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'EB Garamond', serif;
            background-color: #FBF8F4;
            color: #000000;
            margin: 0;
            padding: 60px 50px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            box-sizing: border-box;
        }

        main {
            flex: 1;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            color: #3a6b35; /* Earthy green */
            font-size: 1.5rem;
            font-weight: normal;
            margin-bottom: 10px;
        }

        .content-divider {
            width: 100%;
            height: 1px;
            background-color: #000;
            margin-bottom: 40px; 
        }

        /* Grid to split the list (left) and image (right) */
        .layout-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 40px;
            margin-bottom: 60px;
        }

        .list-box {
            border: 1px solid #000; 
            padding: 20px 30px;
            min-height: 400px; 
        }

        .item-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .item-list li {
            display: flex;
            justify-content: space-between; 
            align-items: baseline;
            margin-bottom: 15px;
        }

        .item-list a.piece-title {
           
            color: #000;
            font-size: 1.1rem;
            transition: color 0.2s ease;
        }

        .item-list a.piece-title:hover {
            color: #3a6b35;
        }

        .meta {
            font-size: 1rem;
            color: #111;
        }

        .side-image-container {
            display: flex;
            justify-content: flex-end; 
            align-items: flex-start;
        }

        .side-image {
            width: 100%;
            max-width: 200px;
            height: auto;
            transition: opacity 0.3s ease; 
            margin-top: -90px; /* Pulls image up to perfectly align with the black line */
        }
        
        .side-image-container a:hover .side-image {
            opacity: 0.7;
        }

        .bottom-image-container {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-top: 20px;
        }

        .bottom-image {
            width: 100px; /* Slightly larger for the food section if needed, adjust as you see fit */
            height: auto;
        }
/* --- MOBILE RESPONSIVE LAYOUT --- */
        @media (max-width: 768px) {
            body {
                padding: 30px 20px; /* Less white space around the edges on small screens */
            }

            .layout-grid {
                display: flex;
                flex-direction: column; /* Stacks the center box and side image vertically */
                gap: 40px;
            }

            .feed-box, .writing-container, .list-box {
                width: 100%;
                padding: 30px 20px; /* Shrinks the padding inside the bordered box */
                margin-top: 20px; 
                box-sizing: border-box; /* Ensures the border doesn't push off the screen */
            }

            .side-image-container {
                position: relative; /* Turns off the 'sticky' scroll effect for mobile */
                top: 0;
                justify-content: center; /* Centers the river valley image under your content */
                width: 100%;
                margin-top: 20px;
            }

            .side-image {
                margin-top: 0; /* Removes the negative margin since it's no longer next to the line */
                max-width: 180px; /* Scales the home button down slightly */
            }

            .entry-title, .piece-title {
                font-size: 1.5rem; /* Scales titles down so they don't break onto awkward lines */
            }

            .entry-body, .piece-body {
                font-size: 1.1rem; /* Slightly smaller text for easier mobile reading */
            }
        }
    </style>
</head>
<body>
    <main>
        <h2 class="section-title">Food and Drink</h2>
        
        <div class="content-divider"></div>

        <div class="layout-grid">
            <div class="list-box">
                <ul class="item-list">
                    <li>
                        <a href="#" class="piece-title">At some point in time this section will contain a wine journal, recipes, 

and other writing related to the The Body and The Blood</a>
                        <span class="meta">[WIP]</span>
                    </li>

                </ul>
            </div>

            <div class="side-image-container">
                <a href="index.html">
                    <img src="river-valley.png" alt="Sketch" class="side-image">
                </a>
            </div>
        </div>

        <div class="bottom-image-container">
            <img src="trout.png" alt="Sketch" class="bottom-image">
        </div>
    </main>
</body>
</html>
